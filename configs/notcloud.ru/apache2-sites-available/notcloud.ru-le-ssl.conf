<IfModule mod_ssl.c>
<VirtualHost *:443>

    ## ..initial settings

    ## Enables Apache Reverse Proxy
    ProxyPreserveHost On

    ## ESRN RSYNC Monitoring :: Python REST API Service Endpoint
    ProxyPass /apps/esrn-rsync-monitoring/ http://localhost:8000/
    ProxyPassReverse /apps/esrn-rsync-monitoring/ http://localhost:8000/
    
    ## ..other settings
    
</VirtualHost>
</IfModule>
