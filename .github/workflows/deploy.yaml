name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    # Keeps an option for manual launch with selection
    inputs:
      deployment_type:
        description: 'Deploy Type'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - clean

# UserDefinedParameter: 'update' - update existed,  'clean' -  deploy mode
# - update: updates existing code in app dir
# - clean:  removes app service and app dir, then clone repo and starts app service
#   
env:
  DEPLOYMENT_TYPE: 'clean'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOYER_USER_PKEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.DEPLOYER_HOST_PORT }} ${{ secrets.DEPLOYER_HOST_FDQN }} >> ~/.ssh/known_hosts
      
      - name: Deploy application
        env:
          # ChoseDeployTypePriority: If runs manually, param takes from GitHub repo Variables, otherwise from Env
          DEPLOY_TYPE: ${{ github.event.inputs.deployment_type || env.DEPLOYMENT_TYPE }}
        run: |
          ssh -p ${{ secrets.DEPLOYER_HOST_PORT }} ${{ secrets.DEPLOYER_USER_NAME }}@${{ secrets.DEPLOYER_HOST_FDQN }} << 'EOF'
            set -e
            
            DEPLOY_TYPE="${{ env.DEPLOY_TYPE }}"
            echo "=== Starting deployment (Type: $DEPLOY_TYPE) ==="
            
            # === Function for Clean Deploy ===
            clean_deploy() {

              echo "=== Performing CLEAN deployment ==="
              
              echo "Stopping service..."
              sudo systemctl stop nve-rsync-monitor 2>/dev/null || true
              sudo systemctl disable nve-rsync-monitor 2>/dev/null || true
              
              echo "Removing service file..."
              sudo rm -f /etc/systemd/system/nve-rsync-monitor.service
              sudo systemctl daemon-reload
              
              echo "Removing project directory..."
              sudo rm -rf /opt/apps/nve-rsync-host-monitor-test
              
              echo "Verifying service is down..."
              if curl -f -s -o /dev/null -w "Status: %{http_code}\n" \
                https://notcloud.ru/apps/esrn-rsync-monitoring/api/status 2>/dev/null; then
                echo "WARNING: Service still responding!"
              else
                echo "✓ Service is down"
              fi
              
              echo "Cloning repository..."
              cd /opt/apps
              git clone https://github.com/drvicx/nve-rsync-host-monitor-test.git
              cd nve-rsync-host-monitor-test
            }
            
            # === Function for Update Deploy ===
            update_deploy() {

              echo "=== Performing UPDATE deployment ==="
              
              if [ ! -d "/opt/apps/nve-rsync-host-monitor-test" ]; then
                echo "Project directory not found. Performing clean deploy instead..."
                clean_deploy
                return
              fi
              
              cd /opt/apps/nve-rsync-host-monitor-test
              
              echo "Pulling latest changes..."
              git pull
            }
            
            # === Deploy Type Choose (clean, update) ===
            if [ "$DEPLOY_TYPE" = "clean" ]; then
              clean_deploy
            else
              update_deploy
            fi
            
            # === Common Steps (run "install script" and start service) ===
            echo "Installing application..."
            ./scripts/install.sh
            
            echo "Starting service..."
            sudo systemctl start nve-rsync-monitor
            sudo systemctl enable nve-rsync-monitor
            
            echo "=== Deployment completed ==="
          EOF
      
      - name: Verify deployment
        run: |
          echo "Waiting for service to start..."
          sleep 15
          
          # Check REST API Service Status (with 30 sec timeout)
          for i in {1..15}; do
            echo -n "Attempt $i/15... "
            if curl -f -s -o /dev/null -w "Status: %{http_code}\n" \
              --connect-timeout 5 \
              --max-time 10 \
              https://notcloud.ru/apps/esrn-rsync-monitoring/api/status; then
              echo "✓ Service is running"
              exit 0
            fi
            sleep 2
          done
          
          echo "✗ Service failed to start"
          exit 1
